<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 圆角正方形背景 -->
  <rect width="512" height="512" rx="112" fill="#CC785C"/>

  <!-- 字母 C，模拟 Claude 的橙棕色品牌风格 -->
  <!-- 外圆弧（大 C） -->
  <path
    d="M320 148
       A140 140 0 1 0 320 364"
    stroke="white"
    stroke-width="52"
    stroke-linecap="round"
    fill="none"
  />

  <!-- 内圆弧（小 C，营造立体感） -->
  <path
    d="M296 196
       A88 88 0 1 0 296 316"
    stroke="white"
    stroke-width="36"
    stroke-linecap="round"
    fill="none"
    opacity="0.35"
  />
</svg>
